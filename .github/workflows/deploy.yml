name: Deploy a GitHub Pages

# Publica la app en GitHub Pages en cada push a main.
on:
  push:
    branches: [main]
  workflow_dispatch: # permite lanzarlo manualmente desde la pestaña Actions

# Permisos que necesita el despliegue a Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Si llegan varios push seguidos, deja correr solo el último.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Construir
        run: npm run build
        env:
          # Estos dos valores se configuran en:
          # Settings -> Secrets and variables -> Actions -> New repository secret
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          # Sin BASE_PATH: vite.config.ts usa su default '/', correcto para
          # servir desde la raíz de habitos.krotonoficial.com.

      - name: Subir artefacto de Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Desplegar a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
